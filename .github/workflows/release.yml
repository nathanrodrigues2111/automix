name: Build desktop packages

# Builds a self-contained Automix package for each OS/arch and attaches them to
# the GitHub Release that triggered the run. Publish a release (or re-publish an
# existing one) to build + upload. Trigger manually from the Actions tab (Run
# workflow) to test a build without touching a release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-14
            label: macos-arm64
          - os: macos-13
            label: macos-x64
          - os: windows-latest
            label: windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install ./backend
          pip install pyinstaller pywebview
          # macOS/Windows get a native window via pywebview's bundled backend
          # (pyobjc / pythonnet, installed automatically). Linux uses the
          # browser fallback in app.py, so no GTK/Qt build is needed here.

      - name: Fetch ffmpeg / ffprobe / yt-dlp
        run: python packaging/fetch_tools.py

      - name: Freeze with PyInstaller
        run: pyinstaller --noconfirm packaging/automix.spec

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf "../Automix-${{ matrix.label }}.tar.gz" Automix
          cd ..
          echo "ASSET=Automix-${{ matrix.label }}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname Automix -srcfolder "dist/Automix.app" \
            -ov -format UDZO "Automix-${{ matrix.label }}.dmg"
          echo "ASSET=Automix-${{ matrix.label }}.dmg" >> "$GITHUB_ENV"

      - name: Package (Windows installer .exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $ver = "${{ github.ref_name }}"
          if (-not $ver) { $ver = "0.0.0" }
          $ver = $ver.TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVer=$ver" packaging\automix.iss
          "ASSET=Automix-windows-x64-setup.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ASSET }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${ASSET}" --clobber
