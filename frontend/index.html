<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Set the theme class before first paint to avoid a flash of the
      // wrong theme. Mirrors src/lib/theme.ts.
      ;(function () {
        try {
          var pref = localStorage.getItem("automix.theme")
          var dark =
            pref === "dark" ||
            (pref !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          document.documentElement.classList.toggle("dark", dark)
        } catch (e) {
          /* default to light */
        }
      })()
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automix — EDM Drop Mixer</title>
    <meta
      name="description"
      content="Paste a YouTube playlist and render a seamless, drop-aligned EDM video mix."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
